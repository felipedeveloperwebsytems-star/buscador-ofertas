<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DryFour | Comparador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Dry<span>Four</span></h1>
            <div class="search-area">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="O que você busca?">
                    <button onclick="buscarProdutos()">Buscar</button>
                </div>
                <div class="filter-bar">
                    <button onclick="ordenarProdutos('menor')">Menor Preço</button>
                    <button onclick="ordenarProdutos('maior')">Maior Preço</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <aside class="tab">
            <button class="tablinks active" onclick="openTab(event, 'results-section')">🔍 Resultados</button>
            <button class="tablinks" onclick="openTab(event, 'nicho-tech')">📱 Tecnologia</button>
            <button class="tablinks" onclick="openTab(event, 'nicho-casa')">🏠 Casa</button>
        </aside>

        <div class="content-area">
            <div id="results-section" class="tabcontent" style="display: block;">
                <div id="loading" class="hidden">Buscando ofertas...</div>
                <div id="resultsGrid" class="results-grid"></div>
                <div id="pagination" class="pagination hidden">
                    <button onclick="mudarPagina(-1)">Anterior</button>
                    <span id="pageIndicator">Página 1</span>
                    <button onclick="mudarPagina(1)">Próxima</button>
                </div>
            </div>

            <div id="nicho-tech" class="tabcontent">
                <h3>Ofertas de Tecnologia</h3>
                <div id="grid-tech" class="results-grid"></div>
            </div>

            <div id="nicho-casa" class="tabcontent">
                <h3>Casa & Eletro</h3>
                <div id="grid-casa" class="results-grid"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
